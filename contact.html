<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-2811224626490460">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2811224626490460"
     crossorigin="anonymous"></script>
  <title>제휴 문의</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #eef2f7 0%, #dbe3ef 100%);
      color: #0f172a;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 24px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      border: 1px solid #dbe3ef;
      overflow: hidden;
    }
    .comments {
      width: 100%;
      max-width: 720px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      border: 1px solid #dbe3ef;
      padding: 24px 28px 28px;
    }
    .comments-head {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eef2f7;
    }
    .card-head {
      padding: 24px 28px 16px;
      border-bottom: 1px solid #eef2f7;
    }
    .tiny-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
    }
    .panel-title {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
    }
    .panel-desc {
      margin-top: 6px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }
    form {
      padding: 24px 28px 28px;
    }
    .field-group { margin-bottom: 16px; }
    .field-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }
    .field-input,
    .field-textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      color: #0f172a;
      background: white;
      border: 1px solid #cad5e4;
      border-radius: 12px;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .field-input:focus,
    .field-textarea:focus {
      border-color: #3155ff;
      box-shadow: 0 0 0 3px rgba(49, 85, 255, 0.12);
    }
    .field-textarea {
      min-height: 140px;
      resize: vertical;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .btn {
      flex: 1;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 12px;
      border: 1px solid #cad5e4;
      background: white;
      color: #334155;
      cursor: pointer;
      transition: transform .1s ease, box-shadow .2s ease, background .2s ease;
    }
    .btn:hover { background: #f8fbff; }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: #3155ff;
      color: white;
      border-color: #3155ff;
    }
    .btn.primary:hover { background: #2745df; }
    .status {
      margin-top: 16px;
      padding: 12px 14px;
      font-size: 13px;
      border-radius: 10px;
      display: none;
    }
    .status.success {
      display: block;
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }
    .status.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <div class="tiny-label">Partnership</div>
      <div class="panel-title">제휴 문의</div>
      <div class="panel-desc">간단한 정보를 남겨주시면 빠르게 회신드리겠습니다.</div>
    </div>
    <form id="contactForm" action="https://formspree.io/f/meevyjzj" method="POST">
      <div class="field-group">
        <label class="field-label" for="name">이름 / 회사명</label>
        <input id="name" name="name" type="text" class="field-input" placeholder="홍길동 / OO컴퍼니" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="email">이메일 주소</label>
        <input id="email" name="email" type="email" class="field-input" placeholder="example@email.com" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="message">문의 내용</label>
        <textarea id="message" name="message" class="field-textarea" placeholder="제휴 제안이나 문의하실 내용을 자유롭게 작성해주세요." required></textarea>
      </div>
      <div class="actions">
        <button type="submit" class="btn primary">보내기</button>
        <button type="reset" class="btn">초기화</button>
      </div>
      <div id="status" class="status"></div>
    </form>
  </div>

  <section class="comments" aria-label="댓글">
    <div class="comments-head">
      <div class="tiny-label">Comments</div>
      <div class="panel-title">댓글로 의견 남기기</div>
    </div>
    <div id="disqus_thread"></div>
    <script>
      var disqus_config = function () {
        this.page.url = window.location.href.split('#')[0];
        this.page.identifier = 'partnership-contact';
      };
      (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://jacobs-lab2.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
      })();
    </script>
    <noscript>댓글을 보려면 JavaScript를 활성화하거나 <a href="https://disqus.com/?ref_noscript">Disqus 페이지</a>를 방문하세요.</noscript>
  </section>

  <script>
    const form = document.getElementById('contactForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.className = 'status';
      status.textContent = '';

      const data = new FormData(form);
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { Accept: 'application/json' }
        });

        if (res.ok) {
          status.className = 'status success';
          status.textContent = '문의가 정상적으로 전송되었습니다. 감사합니다!';
          form.reset();
        } else {
          const json = await res.json().catch(() => ({}));
          const msg = json.errors?.map(err => err.message).join(', ') || '전송 중 오류가 발생했습니다.';
          status.className = 'status error';
          status.textContent = msg;
        }
      } catch (err) {
        status.className = 'status error';
        status.textContent = '네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
      }
    });
  </script>
</body>
</html>
